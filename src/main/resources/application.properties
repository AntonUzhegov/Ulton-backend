# ============================================
# DATABASE CONFIGURATION
# ============================================
spring.datasource.url=jdbc:postgresql://localhost:5432/CoursesDB
spring.datasource.username=app_user
spring.datasource.password=app_user_password
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

spring.sql.init.mode=never

# ============================================
# EMAIL CONFIGURATION (GMAIL)
# ============================================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=uzhegov2006@gmail.com
spring.mail.password=${GMAIL_APP_PASSWORD:YOUR_APP_PASSWORD_HERE}  # ????? ?? ?????????? ?????????

spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000
spring.mail.default-encoding=UTF-8
spring.mail.protocol=smtp

# ============================================
# APPLICATION SPECIFIC
# ============================================
app.admin.email=uzhegov2006@gmail.com

# ============================================
# SERVER CONFIGURATION
# ============================================
server.port=8080
server.servlet.context-path=/
server.error.whitelabel.enabled=false

# ============================================
# JACKSON (JSON CONFIGURATION)
# ============================================
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=UTC
spring.jackson.default-property-inclusion=non_null

# ============================================
# LOGGING
# ============================================
logging.level.ru.ulanton.courses=DEBUG
logging.level.org.springframework.security=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE